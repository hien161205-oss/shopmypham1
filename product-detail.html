<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm - Q&H SKINLAB</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="sticky-header" id="stickyHeader">
    <header>
        <div class="container header-main">
            <a href="index.html" class="logo">Q&<span>H SKINLAB</span></a>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Tìm sản phẩm...">
                <button class="search-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
                <div id="searchResults" class="search-results"></div>
            </div>
            <div class="header-actions">
                <div class="hotline-info" id="headerHotline">Hotline: 1900 636 510</div>
                <div class="action-item" id="adminPanelBtn" style="display: none;">ADMIN PANEL</div>
                <div class="action-item" id="accountTrigger">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <span id="userNameDisplay" class="user-name-display"></span>
                </div>
                <div class="action-item" id="cartTrigger">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                    <span class="cart-badge" id="cartBadge">0</span>
                </div>
            </div>
        </div>
    </header>
</div>

<main class="container">
    <div class="breadcrumb" style="margin: 20px 0;">
        <a href="index.html">Trang chủ</a> / <span id="breadcrumbName">Sản phẩm</span>
    </div>

    <div class="product-detail-layout" style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin: 40px 0;">
        <!-- Cột trái: Ảnh sản phẩm -->
        <div>
            <div class="product-detail-image">
                <img id="mainImg" src="" alt="Sản phẩm" style="width: 100%; border-radius: 12px;">
            </div>
        </div>

        <!-- Cột phải: Thông tin sản phẩm -->
        <div>
            <div class="product-brand" id="productBrand" style="font-size: 14px; color: var(--primary); font-weight: 700;"></div>
            <h1 class="product-name" id="productName" style="font-size: 24px; font-weight: 800; margin: 10px 0;"></h1>
            
            <div class="product-price" style="margin: 20px 0;">
                <span class="current-price" id="productPrice" style="font-size: 28px; font-weight: 800; color: var(--red);"></span>
                <span class="old-price" id="productOldPrice" style="text-decoration: line-through; color: #999; margin-left: 10px;"></span>
            </div>

            <div class="product-quantity" style="margin: 20px 0; display: flex; align-items: center; gap: 15px;">
                <span>Số lượng:</span>
                <div style="display: flex; border: 1px solid #ddd; border-radius: 4px;">
                    <button id="qtyMinus" style="padding: 8px 12px; border: none; background: #f5f5f5; cursor: pointer;">-</button>
                    <input type="number" id="pdQty" value="1" min="1" style="width: 60px; text-align: center; border: none;">
                    <button id="qtyPlus" style="padding: 8px 12px; border: none; background: #f5f5f5; cursor: pointer;">+</button>
                </div>
            </div>

            <div class="product-actions" style="display: flex; gap: 15px; margin: 30px 0;">
                <button id="addToCartBtn" style="flex: 1; padding: 15px; background: var(--primary); color: white; border: none; font-weight: 800; cursor: pointer;">THÊM VÀO GIỎ</button>
                <button id="buyNowBtn" style="flex: 1; padding: 15px; background: var(--red); color: white; border: none; font-weight: 800; cursor: pointer;">MUA NGAY</button>
            </div>

            <div class="product-benefits" style="border-top: 1px solid #eee; padding-top: 20px;">
                <p>✅ Cam kết chính hãng 100%</p>
                <p>🚚 Giao hàng toàn quốc</p>
            </div>
        </div>
    </div>

    <div class="product-description" style="margin: 40px 0; padding: 30px; background: #f9f9f9; border-radius: 12px;">
        <h3 style="font-weight: 800; margin-bottom: 20px;">CHI TIẾT SẢN PHẨM</h3>
        <div id="productDetails" style="line-height: 1.8;"></div>
    </div>
</main>

<script src="/script.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const productId = localStorage.getItem('selectedProductId');
        const products = window.products || [];
        const product = products.find(p => p.id == productId);
        
        if (product) {
            document.getElementById('productBrand').innerText = product.brand;
            document.getElementById('productName').innerText = product.name;
            document.getElementById('productPrice').innerText = product.price.toLocaleString() + 'đ';
            if (product.oldPrice) document.getElementById('productOldPrice').innerText = product.oldPrice.toLocaleString() + 'đ';
            document.getElementById('mainImg').src = product.image;
            document.getElementById('productDetails').innerHTML = product.details || 'Không có mô tả chi tiết.';
            document.getElementById('breadcrumbName').innerText = product.name;
        }

        const qtyInput = document.getElementById('pdQty');
        document.getElementById('qtyMinus')?.addEventListener('click', () => { if (qtyInput.value > 1) qtyInput.value--; });
        document.getElementById('qtyPlus')?.addEventListener('click', () => { qtyInput.value++; });
        
        document.getElementById('addToCartBtn')?.addEventListener('click', () => {
            if (product) addToCart(product.id, parseInt(qtyInput.value));
        });
        document.getElementById('buyNowBtn')?.addEventListener('click', () => {
            if (product) buyNow(product.id);
        });
    });
</script>

</body>
</html>
